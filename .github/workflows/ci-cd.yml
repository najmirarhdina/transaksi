name: CI/CD Build & Docker (H2 Dummy)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build & Test (H2)
      run: mvn clean package -DskipTests=false

    - name: Build Docker Image
      run: docker build -t transaksi-app:latest .

    - name: Run Docker Container
      run: docker run -d -p 8080:8080 --name transaksi-app transaksi-app:latest

    - name: Wait for App Startup
      run: sleep 15

    - name: Check App Health
      run: curl -f http://localhost:8080 || exit 1

    - name: Notify Success
      if: success()
      run: echo "🎉 CI/CD sukses! Build, test & docker semua OK!"

    - name: Notify Failure
      if: failure()
      run: echo "❌ Ada error saat CI/CD berjalan!"
