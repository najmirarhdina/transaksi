name: CI/CD Build & Docker

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build and run tests
      run: mvn clean package

    - name: Build Docker image
      run: |
        docker build -t transaksi-app:latest .

    - name: Run Docker container (detached)
      run: |
        docker run -d -p 8080:8080 --name transaksi-app transaksi-app:latest

    - name: Check application running
      run: |
        sleep 10
        curl -f http://localhost:8080 || exit 1

    - name: Notify GitHub Status
      if: success()
      run: echo "✅ Build and tests successful!"
    
    - name: Notify GitHub Status on Failure
      if: failure()
      run: echo "❌ Build or tests failed!"
